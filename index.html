<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>근태관리</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 2rem 1rem; }
  .card { background: #fff; border-radius: 16px; padding: 2rem; width: 100%; max-width: 480px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; color: #111; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }

  /* 탭 */
  .tabs { display: flex; gap: 4px; background: #f5f5f5; border-radius: 10px; padding: 4px; margin-bottom: 1.5rem; }
  .tab-btn { flex: 1; padding: 8px; border: none; border-radius: 8px; background: transparent; font-size: 13px; font-weight: 600; color: #888; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .tab-btn.active { background: #fff; color: #111; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

  /* 현황 */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
  .stat-card { border-radius: 12px; padding: 1.2rem; border: 1.5px solid #e0e0e0; }
  .stat-card.yeonga { border-color: #b3d4f5; background: #EBF3FC; }
  .stat-card.daechae { border-color: #b3e6c8; background: #e8f5ee; }
  .stat-label { font-size: 12px; font-weight: 600; color: #666; margin-bottom: 8px; }
  .stat-value { font-size: 32px; font-weight: 700; color: #111; line-height: 1; }
  .stat-unit { font-size: 12px; color: #888; margin-top: 4px; }
  .stat-sub { font-size: 11px; color: #aaa; margin-top: 8px; border-top: 1px solid rgba(0,0,0,0.08); padding-top: 8px; }
  .refresh-btn { width: 100%; padding: 10px; border-radius: 10px; border: 1.5px solid #e0e0e0; background: #fff; font-size: 13px; font-weight: 500; color: #666; cursor: pointer; font-family: inherit; margin-bottom: 1rem; transition: all 0.15s; }
  .refresh-btn:hover { border-color: #aaa; }
  .updated { font-size: 11px; color: #bbb; text-align: right; margin-top: 0.5rem; }

  /* 입력 */
  .section-label { font-size: 12px; font-weight: 600; color: #666; margin-bottom: 8px; }
  .type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .type-btn { border: 1.5px solid #e0e0e0; border-radius: 10px; padding: 12px 6px; background: #fff; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: all 0.15s; }
  .type-btn:hover { border-color: #aaa; background: #f9f9f9; }
  .type-btn.selected { border-color: #4A90D9; background: #EBF3FC; }
  .type-btn .label { font-size: 13px; font-weight: 600; color: #222; }
  .type-btn .sub { font-size: 11px; color: #999; }
  .type-btn.selected .label { color: #1a5fa8; }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: #666; margin-bottom: 6px; }
  .field input, .field select, .field textarea { width: 100%; border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 10px 12px; font-size: 14px; color: #222; background: #fff; font-family: inherit; transition: border-color 0.15s; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #4A90D9; }
  .field textarea { resize: none; height: 70px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .hours-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .hour-btn { border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 8px 16px; background: #fff; cursor: pointer; font-size: 13px; font-weight: 500; color: #444; transition: all 0.15s; }
  .hour-btn:hover { border-color: #aaa; }
  .hour-btn.selected { border-color: #4A90D9; background: #EBF3FC; color: #1a5fa8; }
  .submit-btn { width: 100%; padding: 13px; border-radius: 10px; border: none; background: #222; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 0.5rem; transition: background 0.15s; }
  .submit-btn:hover { background: #444; }
  .submit-btn:disabled { background: #aaa; cursor: not-allowed; }
  .divider { border: none; border-top: 1px solid #f0f0f0; margin: 1.25rem 0; }
  .result { margin-top: 1rem; padding: 12px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; display: none; white-space: pre-line; }
  .result.success { background: #e6f4ea; color: #1e7e34; }
  .result.error { background: #fdecea; color: #c0392b; }
  .loading-msg { display: none; text-align: center; color: #888; font-size: 13px; margin-top: 10px; }
  .loading { text-align: center; color: #aaa; font-size: 13px; padding: 2rem 0; }

  /* 설정 */
  .config-toggle { font-size: 12px; color: #4A90D9; cursor: pointer; margin-bottom: 1rem; display: block; }
  .config-section { background: #f9f9f9; border-radius: 10px; padding: 1rem; margin-bottom: 1.5rem; border: 1.5px solid #e0e0e0; }
</style>
</head>
<body>
<div class="card">
  <h1>근태관리</h1>
  <p class="subtitle">오프로님 연가 · 대체휴무</p>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('status')">현황 조회</button>
    <button class="tab-btn" onclick="switchTab('input')">근태 입력</button>
    <button class="tab-btn" onclick="switchTab('config')">설정</button>
  </div>

  <!-- 현황 탭 -->
  <div id="tab-status">
    <button class="refresh-btn" onclick="loadStatus()">↻ 새로고침</button>
    <div id="status-content"><div class="loading">불러오는 중...</div></div>
    <p class="updated" id="updated"></p>
  </div>

  <!-- 입력 탭 -->
  <div id="tab-input" style="display:none">
    <div class="section-label">근태 종류</div>
    <div class="type-grid">
      <button class="type-btn" data-type="지참" data-hours="3" data-category="대체휴무" onclick="selectType(this)">
        <span class="label">지참</span><span class="sub">오전 3h</span>
      </button>
      <button class="type-btn" data-type="조퇴" data-hours="1" data-category="대체휴무" onclick="selectType(this)">
        <span class="label">조퇴</span><span class="sub">1h~</span>
      </button>
      <button class="type-btn" data-type="외출" data-hours="1" data-category="대체휴무" onclick="selectType(this)">
        <span class="label">외출</span><span class="sub">1h~</span>
      </button>
      <button class="type-btn" data-type="연가(반차)" data-hours="4" data-category="연가" onclick="selectType(this)">
        <span class="label">연가 반차</span><span class="sub">4h</span>
      </button>
      <button class="type-btn" data-type="연가(종일)" data-hours="8" data-category="연가" onclick="selectType(this)">
        <span class="label">연가 종일</span><span class="sub">8h</span>
      </button>
      <button class="type-btn" data-type="대체휴무" data-hours="8" data-category="대체휴무" onclick="selectType(this)">
        <span class="label">대체휴무</span><span class="sub">자유설정</span>
      </button>
    </div>
    <div id="hours-section" style="display:none">
      <div class="section-label">시간</div>
      <div class="hours-row" id="hours-row"></div>
    </div>
    <hr class="divider">
    <div class="row">
      <div class="field">
        <label>날짜</label>
        <input type="date" id="date-input">
      </div>
      <div class="field">
        <label>구분</label>
        <select id="category-input">
          <option value="대체휴무">대체휴무</option>
          <option value="연가">연가</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>사유 (선택)</label>
      <textarea id="reason-input" placeholder="개인사유, 병원, 가족행사 등"></textarea>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitForm()">기록하기</button>
    <div class="loading-msg" id="loading-msg">⏳ 노션 · 캘린더에 기록 중...</div>
    <div class="result" id="result"></div>
  </div>

  <!-- 설정 탭 -->
  <div id="tab-config" style="display:none">
    <div class="field">
      <label>노션 API 토큰</label>
      <input type="password" id="notion-token" placeholder="ntn_xxx...">
    </div>
    <div class="field">
      <label>Google Apps Script URL</label>
      <input type="text" id="gas-url" placeholder="https://script.google.com/...">
    </div>
    <button onclick="saveConfig()" style="width:100%; padding:11px; border-radius:10px; border:none; background:#222; color:#fff; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit;">저장</button>
    <p id="config-saved" style="font-size:12px; color:green; text-align:center; margin-top:8px; display:none">저장 완료! ✓</p>
  </div>
</div>

<script>
const YEONGA_DB = '4baef3a8-6e35-4cef-98cc-36c1f0c09825';
const DAECHAE_DB = '80474216-dacb-493e-b4ac-b77a5d07a67d';

var selectedType = null;
var selectedHours = null;
var today = new Date();
document.getElementById('date-input').value = today.toISOString().split('T')[0];

// 설정 로드
function loadConfig() {
  document.getElementById('notion-token').value = localStorage.getItem('notion_token') || '';
  document.getElementById('gas-url').value = localStorage.getItem('gas_url') || '';
}
function saveConfig() {
  localStorage.setItem('notion_token', document.getElementById('notion-token').value.trim());
  localStorage.setItem('gas_url', document.getElementById('gas-url').value.trim());
  var el = document.getElementById('config-saved');
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2000);
  loadStatus();
}
loadConfig();

// 탭 전환
function switchTab(tab) {
  ['status','input','config'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['status','input','config'][i] === tab);
  });
  if (tab === 'status') loadStatus();
}

// 현황 조회
async function queryDB(dbId, token) {
  var res = await fetch('https://api.notion.com/v1/databases/' + dbId + '/query', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', 'Notion-Version': '2022-06-28' },
    body: JSON.stringify({ page_size: 100 })
  });
  if (!res.ok) throw new Error('노션 조회 실패 (' + res.status + ')');
  return res.json();
}

function toDetail(hours) {
  var days = Math.floor(hours / 8);
  var remain = Math.round((hours % 8) * 100) / 100;
  if (days > 0 && remain > 0) return days + '일 ' + remain + 'h';
  if (days > 0) return days + '일';
  return remain + 'h';
}

async function loadStatus() {
  var token = localStorage.getItem('notion_token');
  if (!token) {
    document.getElementById('status-content').innerHTML = '<div style="background:#fff3cd;color:#856404;border-radius:8px;padding:12px;font-size:13px;">⚙️ 설정 탭에서 노션 토큰을 먼저 입력해주세요.</div>';
    return;
  }
  document.getElementById('status-content').innerHTML = '<div class="loading">불러오는 중...</div>';
  try {
    var [yeongaData, daechaeData] = await Promise.all([
      queryDB(YEONGA_DB, token),
      queryDB(DAECHAE_DB, token)
    ]);
    var yeongaTotal = 0;
    yeongaData.results.forEach(p => {
      var hours = p.properties['시간']?.number || 0;
      var type = p.properties['유형']?.select?.name || '';
      if (type.includes('부여')) yeongaTotal += hours;
      else if (hours > 0) yeongaTotal -= hours;
    });
    var daechaeTotal = 0;
    daechaeData.results.forEach(p => {
      var hours = p.properties['시간']?.number || 0;
      var type = p.properties['구분']?.select?.name || '';
      if (type === '적립') daechaeTotal += hours;
      else if (type === '사용') daechaeTotal -= hours;
    });
    daechaeTotal = Math.round(daechaeTotal * 100) / 100;
    document.getElementById('status-content').innerHTML = `
      <div class="stat-grid">
        <div class="stat-card yeonga">
          <div class="stat-label">연가 잔여</div>
          <div class="stat-value">${Math.floor(yeongaTotal/8)}</div>
          <div class="stat-unit">일 (${yeongaTotal}h)</div>
          <div class="stat-sub">${toDetail(yeongaTotal)}</div>
        </div>
        <div class="stat-card daechae">
          <div class="stat-label">대체휴무 잔여</div>
          <div class="stat-value">${Math.floor(daechaeTotal/8)}</div>
          <div class="stat-unit">일 (${daechaeTotal}h)</div>
          <div class="stat-sub">${toDetail(daechaeTotal)}</div>
        </div>
      </div>`;
    document.getElementById('updated').textContent = '마지막 업데이트: ' + new Date().toLocaleString('ko-KR');
  } catch(err) {
    document.getElementById('status-content').innerHTML = '<div style="background:#fdecea;color:#c0392b;border-radius:8px;padding:12px;font-size:13px;">❌ ' + err.message + '</div>';
  }
}

// 근태 입력
function selectType(btn) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedType = btn.dataset.type;
  var defaultHours = parseInt(btn.dataset.hours);
  document.getElementById('category-input').value = btn.dataset.category;
  var hoursSection = document.getElementById('hours-section');
  if (['지참','연가(반차)','연가(종일)'].includes(selectedType)) {
    hoursSection.style.display = 'none';
    selectedHours = defaultHours;
  } else {
    hoursSection.style.display = 'block';
    renderHours(selectedType, defaultHours);
  }
}

function renderHours(type, defaultH) {
  var row = document.getElementById('hours-row');
  row.innerHTML = '';
  var options = type === '대체휴무' ? [4,8] : [1,2,3,4];
  selectedHours = defaultH;
  options.forEach(h => {
    var btn = document.createElement('button');
    btn.className = 'hour-btn' + (h === defaultH ? ' selected' : '');
    btn.textContent = h + 'h';
    btn.onclick = () => {
      document.querySelectorAll('.hour-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedHours = h;
    };
    row.appendChild(btn);
  });
  var customBtn = document.createElement('button');
  customBtn.className = 'hour-btn';
  customBtn.textContent = '직접입력';
  customBtn.onclick = () => {
    var val = prompt('시간을 입력하세요 (숫자)');
    if (val && !isNaN(val)) {
      document.querySelectorAll('.hour-btn').forEach(b => b.classList.remove('selected'));
      customBtn.classList.add('selected');
      customBtn.textContent = val + 'h';
      selectedHours = parseFloat(val);
    }
  };
  row.appendChild(customBtn);
}

async function submitForm() {
  var NOTION_TOKEN = localStorage.getItem('notion_token');
  var GAS_URL = localStorage.getItem('gas_url');
  if (!NOTION_TOKEN || !GAS_URL) { alert('⚙️ 설정 탭에서 노션 토큰과 GAS URL을 먼저 입력해주세요.'); switchTab('config'); return; }
  if (!selectedType) { alert('근태 종류를 선택해주세요.'); return; }
  var date = document.getElementById('date-input').value;
  if (!date) { alert('날짜를 선택해주세요.'); return; }
  var category = document.getElementById('category-input').value;
  var reason = document.getElementById('reason-input').value.trim() || '개인사유';
  var hours = selectedHours || 0;
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('loading-msg').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  try {
    var dbId = category === '연가' ? YEONGA_DB : DAECHAE_DB;
    var notionProps = category === '연가'
      ? { '내용':{title:[{text:{content:selectedType}}]}, '날짜':{date:{start:date}}, '유형':{select:{name:'연가'}}, '시간':{number:hours}, '사유':{rich_text:[{text:{content:reason}}]}, '소진구분':{select:{name:'2026신규분'}} }
      : { '내용':{title:[{text:{content:selectedType}}]}, '날짜':{date:{start:date}}, '구분':{select:{name:'사용'}}, '시간':{number:hours}, '사유':{rich_text:[{text:{content:reason}}]} };
    var notionRes = await fetch('https://api.notion.com/v1/pages', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + NOTION_TOKEN, 'Content-Type': 'application/json', 'Notion-Version': '2022-06-28' },
      body: JSON.stringify({ parent:{database_id:dbId}, properties:notionProps })
    });
    if (!notionRes.ok) throw new Error('노션 등록 실패 (' + notionRes.status + ')');
    var calData = { title: selectedType+' ('+reason+')', description: selectedType+' '+hours+'h ('+reason+')', allDay: true, date: date+'T00:00:00' };
    if (selectedType==='지참') { calData.allDay=false; calData.startTime=date+'T09:00:00+09:00'; calData.endTime=date+'T12:00:00+09:00'; }
    else if (selectedType==='조퇴'||selectedType==='외출') { calData.allDay=false; calData.startTime=date+'T17:00:00+09:00'; calData.endTime=date+'T'+String(17+hours).padStart(2,'0')+':00:00+09:00'; }
    await fetch(GAS_URL, { method:'POST', body:JSON.stringify(calData) });
    var el = document.getElementById('result');
    el.className = 'result success';
    el.textContent = '✅ '+selectedType+' '+hours+'h 등록 완료!\n노션과 캘린더에 기록되었습니다.';
    el.style.display = 'block';
  } catch(err) {
    var el = document.getElementById('result');
    el.className = 'result error';
    el.textContent = '❌ 오류: ' + err.message;
    el.style.display = 'block';
  }
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('loading-msg').style.display = 'none';
}

loadStatus();
</script>
</body>
</html>
