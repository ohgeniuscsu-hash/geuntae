<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>잔여 현황</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 2rem 1rem; }
  .card { background: #fff; border-radius: 16px; padding: 2rem; width: 100%; max-width: 480px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; color: #111; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
  .stat-card { background: #f9f9f9; border-radius: 12px; padding: 1.2rem; border: 1.5px solid #e0e0e0; }
  .stat-card.yeonga { border-color: #b3d4f5; background: #EBF3FC; }
  .stat-card.daechae { border-color: #b3e6c8; background: #e8f5ee; }
  .stat-label { font-size: 12px; font-weight: 600; color: #666; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 700; color: #111; line-height: 1; }
  .stat-unit { font-size: 13px; color: #888; margin-top: 4px; }
  .stat-detail { font-size: 11px; color: #aaa; margin-top: 8px; border-top: 1px solid #e0e0e0; padding-top: 8px; }
  .stat-detail span { display: block; }
  .refresh-btn { width: 100%; padding: 11px; border-radius: 10px; border: 1.5px solid #e0e0e0; background: #fff; font-size: 14px; font-weight: 500; color: #444; cursor: pointer; font-family: inherit; transition: all 0.15s; margin-bottom: 1rem; }
  .refresh-btn:hover { border-color: #aaa; background: #f9f9f9; }
  .loading { text-align: center; color: #aaa; font-size: 13px; padding: 2rem 0; }
  .error { background: #fdecea; color: #c0392b; border-radius: 8px; padding: 12px; font-size: 13px; margin-bottom: 1rem; }
  .updated { font-size: 11px; color: #bbb; text-align: right; margin-top: 0.5rem; }
  .divider { border: none; border-top: 1px solid #f0f0f0; margin: 1.25rem 0; }
  .go-input { display: block; text-align: center; margin-top: 1rem; padding: 11px; border-radius: 10px; border: none; background: #222; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; text-decoration: none; }
  .go-input:hover { background: #444; }
  .config-toggle { font-size: 12px; color: #4A90D9; cursor: pointer; margin-bottom: 1rem; display: block; }
  .config-section { background: #f9f9f9; border-radius: 10px; padding: 1rem; margin-bottom: 1.5rem; border: 1.5px solid #e0e0e0; }
  .field { margin-bottom: 0.5rem; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: #666; margin-bottom: 4px; }
  .field input { width: 100%; border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 8px 10px; font-size: 13px; color: #222; background: #fff; font-family: inherit; }
</style>
</head>
<body>
<div class="card">
  <h1>잔여 현황</h1>
  <p class="subtitle">오프로님 연가 · 대체휴무 실시간 조회</p>

  <span class="config-toggle" onclick="toggleConfig()">⚙️ 설정</span>
  <div id="config-section" class="config-section" style="display:none">
    <div class="field">
      <label>노션 API 토큰</label>
      <input type="password" id="notion-token" placeholder="ntn_xxx...">
    </div>
    <button onclick="saveConfig()" style="margin-top:8px; padding:8px 16px; border-radius:8px; border:none; background:#222; color:#fff; font-size:13px; cursor:pointer;">저장 후 조회</button>
    <span id="config-saved" style="font-size:12px; color:green; margin-left:8px; display:none">저장됨 ✓</span>
  </div>

  <button class="refresh-btn" onclick="loadData()">↻ 새로고침</button>

  <div id="content">
    <div class="loading">데이터 불러오는 중...</div>
  </div>

  <p class="updated" id="updated"></p>

  <hr class="divider">
  <a href="index.html" class="go-input">+ 근태 입력하기</a>
</div>

<script>
const YEONGA_DB = '4baef3a8-6e35-4cef-98cc-36c1f0c09825';
const DAECHAE_DB = '80474216-dacb-493e-b4ac-b77a5d07a67d';

function loadConfig() {
  document.getElementById('notion-token').value = localStorage.getItem('notion_token') || '';
}
function saveConfig() {
  localStorage.setItem('notion_token', document.getElementById('notion-token').value.trim());
  document.getElementById('config-saved').style.display = 'inline';
  setTimeout(() => document.getElementById('config-saved').style.display = 'none', 2000);
  loadData();
}
function toggleConfig() {
  var s = document.getElementById('config-section');
  s.style.display = s.style.display === 'none' ? 'block' : 'none';
}
loadConfig();

async function queryDB(dbId, token) {
  var res = await fetch('https://api.notion.com/v1/databases/' + dbId + '/query', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', 'Notion-Version': '2022-06-28' },
    body: JSON.stringify({ page_size: 100 })
  });
  if (!res.ok) throw new Error('노션 조회 실패 (' + res.status + ')');
  return res.json();
}

function toHHmm(hours) {
  var days = Math.floor(hours / 8);
  var remain = hours % 8;
  if (days > 0 && remain > 0) return days + '일 ' + remain + 'h';
  if (days > 0) return days + '일';
  return remain + 'h';
}

async function loadData() {
  var token = localStorage.getItem('notion_token');
  if (!token) {
    document.getElementById('content').innerHTML = '<div class="error">⚙️ 설정에서 노션 토큰을 먼저 입력해주세요.</div>';
    document.getElementById('config-section').style.display = 'block';
    return;
  }

  document.getElementById('content').innerHTML = '<div class="loading">데이터 불러오는 중...</div>';

  try {
    var [yeongaData, daechaeData] = await Promise.all([
      queryDB(YEONGA_DB, token),
      queryDB(DAECHAE_DB, token)
    ]);

    // 연가 계산
    var yeongaTotal = 0;
    yeongaData.results.forEach(p => {
      var props = p.properties;
      var hours = props['시간']?.number || 0;
      var type = props['유형']?.select?.name || '';
      if (type.includes('부여')) yeongaTotal += hours;
      else if (hours > 0) yeongaTotal -= hours;
    });

    // 대체휴무 계산
    var daechaeTotal = 0;
    daechaeData.results.forEach(p => {
      var props = p.properties;
      var hours = props['시간']?.number || 0;
      var type = props['구분']?.select?.name || '';
      if (type === '적립') daechaeTotal += hours;
      else if (type === '사용') daechaeTotal -= hours;
    });

    document.getElementById('content').innerHTML = `
      <div class="stat-grid">
        <div class="stat-card yeonga">
          <div class="stat-label">연가 잔여</div>
          <div class="stat-value">${Math.floor(yeongaTotal / 8)}</div>
          <div class="stat-unit">일 (${yeongaTotal}h)</div>
          <div class="stat-detail">
            <span>= ${toHHmm(yeongaTotal)}</span>
          </div>
        </div>
        <div class="stat-card daechae">
          <div class="stat-label">대체휴무 잔여</div>
          <div class="stat-value">${Math.floor(daechaeTotal / 8)}</div>
          <div class="stat-unit">일 (${daechaeTotal.toFixed(2)}h)</div>
          <div class="stat-detail">
            <span>= ${toHHmm(daechaeTotal)}</span>
          </div>
        </div>
      </div>
    `;

    var now = new Date();
    document.getElementById('updated').textContent = '마지막 업데이트: ' + now.toLocaleString('ko-KR');

  } catch(err) {
    document.getElementById('content').innerHTML = '<div class="error">❌ 오류: ' + err.message + '</div>';
  }
}

loadData();
</script>
</body>
</html>
